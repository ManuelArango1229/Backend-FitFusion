name: DevSecOps – FitFusion Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Construir y publicar la imagen desde el repo de FitFusion ─────
  build-image:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout FitFusion repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar nombre de imagen
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}/fitfusion-backend:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "✅ Imagen: ${IMAGE}"

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  # ── JOB 2: Pipeline DevSecOps ─────────────────────────────────────────────
  security:
    name: DevSecOps Pipeline
    needs: build-image
    uses: ManuelArango1229/devsecops-engine-/.github/workflows/reusable-devsecops.yml@main
    with:
      # Imagen ya construida y publicada en GHCR por el job anterior
      target_image: ${{ needs.build-image.outputs.image }}
      target_port:  '3000'
      service_name: 'fitfusion-backend'
      criticality:  'high'
      environment:  'staging'

      # Repo cuyo código fuente escaneará Semgrep
      source_repo:     'ManuelArango1229/Backend-FitFusion'
      source_repo_ref: 'main'

      # Forzar Node.js para Semgrep (evita auto-detección incorrecta del engine)
      language: 'nodejs'

    secrets:
      # ── IA ──────────────────────────────────────────────────────────────
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}

      # ── Token para pull de la imagen privada desde GHCR ─────────────────
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Variables de entorno para levantar FitFusion en los scans DAST ──
      # Configura APP_SECRETS en Settings → Secrets → Actions de tu repo
      # con el formato: "KEY1=valor1,KEY2=valor2,KEY3=valor3"
      #
      # Para FitFusion necesitas al menos:
      #   MONGO_URI=<tu_mongo_uri_de_test>,JWT_SECRET=<secreto>,NODE_ENV=test
      #
      # Opción A — Un solo secret APP_SECRETS con todo concatenado:
      APP_SECRETS: ${{ secrets.APP_SECRETS }}
