name: DevSecOps – FitFusion Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Construir y publicar la imagen en GHCR ────────────────
  build-image:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout FitFusion repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar nombre de imagen
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}/fitfusion-backend:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "✅ Imagen: ${IMAGE}"

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}

  # ── JOB 2: Pipeline DevSecOps ─────────────────────────────────────
  security:
    name: DevSecOps Pipeline
    needs: build-image
    uses: ManuelArango1229/devsecops-engine-/.github/workflows/reusable-devsecops.yml@main
    with:
      target_image:    ${{ needs.build-image.outputs.image }}
      target_port:     '3000'
      service_name:    'fitfusion-backend'
      criticality:     'high'
      environment:     'staging'
      source_repo:     'ManuelArango1229/Backend-FitFusion'
      source_repo_ref: 'main'
      language:        'nodejs'
      use_ghcr:        true

    secrets:
      # ── IA — al menos GROQ_API_KEY es obligatoria ────────────────
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── GHCR — para hacer pull de la imagen privada ──────────────
      GHCR_TOKEN:        ${{ secrets.GITHUB_TOKEN }}

      # ── Variables de entorno para levantar FitFusion en DAST ─────
      # Configura este secret en Settings → Secrets → Actions con:
      # MONGO_URI=mongodb+srv://...,JWT_SECRET=...,NODE_ENV=test,PORT=3000,GOOGLE_CLIENT_ID=dummy,GOOGLE_CLIENT_SECRET=dummy
      APP_SECRETS:       ${{ secrets.APP_SECRETS }}
