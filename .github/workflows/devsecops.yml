name: DevSecOps – FitFusion Backend
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
 
jobs:
 
  # ── JOB 1: Construir y publicar la imagen desde el repo de FitFusion ─────
  # Este job corre EN el repo de FitFusion donde sí existe el Dockerfile.
  # La imagen se sube a GHCR para que el engine pueda hacer docker pull.
  build-image:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
 
    steps:
      - name: Checkout FitFusion repo
        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Generar nombre de imagen
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}/fitfusion-backend:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "✅ Imagen que se va a construir: ${IMAGE}"
 
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
 
  # ── JOB 2: Pipeline DevSecOps usando la imagen ya construida ─────────────
  # El engine hace docker pull de la imagen desde GHCR — no necesita
  # el Dockerfile de FitFusion porque la imagen ya está publicada.
  security:
    name: DevSecOps Pipeline
    needs: build-image
    uses: ManuelArango1229/devsecops-engine-/.github/workflows/reusable-devsecops.yml@main
    with:
      target_image: ${{ needs.build-image.outputs.image }}
      target_port:  '3000'
      service_name: 'fitfusion-backend'
      criticality:  'high'
      environment:  'staging'
    secrets:
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
 
